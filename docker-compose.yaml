services:
  redis:
    image: docker.1ms.run/bitnami/redis:latest
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  guacd:
    image: guacamole/guacd
    restart: always
    user: root
    ports:
      - "4822:4822"
    volumes:
      - ./recordings:/recordings
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  guac-worker:
    build:
      context: ./guac-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./recordings:/recordings
    environment:
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      S3_BUCKET: ${MINIO_BUCKET}
      S3_USE_SSL: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  elasticsearch:
    image: docker.1ms.run/library/elasticsearch:8.17.10
    restart: always
    environment:
      - node.name=es01
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: docker.1ms.run/minio/minio:latest
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./recordings:/opt/recordings
    environment:
      GREMOTE_REDIS_ADDR: redis:6379
      GREMOTE_ES_URL: http://elasticsearch:9200
      GREMOTE_S3_ENDPOINT: minio:9000
      GREMOTE_S3_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      GREMOTE_S3_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      GREMOTE_S3_BUCKET: ${MINIO_BUCKET}
      GREMOTE_GUACD_HOST: guacd
      GREMOTE_GUACD_RECORDING_PATH: /opt/recordings
      GREMOTE_GUACD_GUACD_PATH: /recordings
      GREMOTE_GUACWORKER_URL: http://guac-worker:8080
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
      guacd:
        condition: service_healthy
      guac-worker:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  es_data:
  minio_data:
