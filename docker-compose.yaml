version: '3'

services:
  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    environment:
      - node.name=es01
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
    environment:
      MINIO_ACCESS_KEY: your_access_key
      MINIO_SECRET_KEY: your_secret_key
    volumes:
      - minio_data:/data
    command: server /data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: webssh-backend:latest
    container_name: webssh-backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - elasticsearch
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: webssh-frontend:latest
    container_name: webssh-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  es_data:
  minio_data:
