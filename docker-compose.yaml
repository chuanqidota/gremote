services:
  redis:
    image: docker.1ms.run/bitnami/redis:latest
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  guacd:
    image: guacamole/guacd
    restart: always
    user: root
    ports:
      - "4822:4822"
    volumes:
      - ./recordings:/recordings
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  guac-worker:
    build:
      context: ./guac-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./recordings:/recordings
    environment:
      S3_ENDPOINT: ${MINIO_ENDPOINT}
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      S3_BUCKET: ${MINIO_BUCKET}
      S3_USE_SSL: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  elasticsearch:
    image: docker.1ms.run/library/elasticsearch:8.17.10
    restart: always
    environment:
      - node.name=es01
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: docker.1ms.run/minio/minio:latest
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./recordings:/opt/recordings
    env_file: .env
    environment:
      GWEBSSH_SERVER_PORT: ${SERVER_PORT}
      GWEBSSH_REDIS_ADDR: ${REDIS_ADDR}
      GWEBSSH_ELASTICSEARCH_URL: ${ES_URL}
      GWEBSSH_S3_ENDPOINT: ${MINIO_ENDPOINT}
      GWEBSSH_S3_ACCESSKEYID: ${MINIO_ACCESS_KEY}
      GWEBSSH_S3_SECRETACCESSKEY: ${MINIO_SECRET_KEY}
      GWEBSSH_S3_BUCKET: ${MINIO_BUCKET}
      GWEBSSH_GUACD_HOST: guacd
      GWEBSSH_GUACD_RECORDINGPATH: /opt/recordings
      GWEBSSH_GUACD_GUACDPATH: /recordings
      GWEBSSH_GUACWORKER_URL: http://guac-worker:8080
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
      guacd:
        condition: service_healthy
      guac-worker:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  es_data:
  minio_data:
