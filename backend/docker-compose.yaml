version: '3'
services:
  # reids
  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"

  # es
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    environment:
      - node.name=es01
      - cluster.name=docker-cluster
      - discovery.type=single-node
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
  
  # minio
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
    environment:
      MINIO_ACCESS_KEY: your_access_key
      MINIO_SECRET_KEY: your_secret_key
    volumes:
      - minio_data:/data
    command: server /data
  
  # 项目本身
  gwebssh:
    restart: always
    build: 
      context: . # 指定Dockerfile文件所在路径
      dockerfile: Dockerfile # 指定Dockerfile文件名称
    image: gwebssh:latest
    container_name: gwebssh
    ports:
     - "8000:8000"


volumes:
  mysql_data:
  es_data:
  minio_data:
